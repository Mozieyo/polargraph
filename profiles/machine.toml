# Polargraph machine profile — the recorded, reproducible calibration.
# Values are starting estimates; the **calibrated** ones get filled in at M2-M4.
# (Success criterion: a build is reproducible from this file. See ARCHITECTURE.md §5.)

[geometry]
motor_spacing_mm = 318.0   # D — pulley center-to-center, measured on the built frame. Refine via calibration plot.
# Frame: left anchor (0,0), right anchor (D,0), y positive downward.

[steppers]
pulley_teeth = 16          # CONFIRMED 16T on the built machine -> 100 steps/mm
microsteps = 16            # A4988 jumpered to 1/16
motor_full_steps_per_rev = 200   # 1.8° NEMA17
belt_pitch_mm = 2.0        # GT2
# steps_per_mm (belt) = 1600 / pulley_teeth  ->  20T = 80, 16T = 100

[motion]
draw_feed_mm_min = 800.0     # pen-down drawing speed; tune for clean lines
travel_feed_mm_min = 2500.0  # pen-up rapid speed
max_rate_mm_min = 2000.0   # conservative for the ~120 g gondola; raise once smooth
acceleration_mm_s2 = 50.0  # gentle — sag/sway control
segment_length_mm = 1.0    # IK spike: worst-case belt-bow ~1.3 um here vs ~200 um pen line. See ARCHITECTURE.md S6.

[gondola]
mount_spacing_mm = 0.0    # gondola v2: belts mount AT the pen tip -> pure point model
pen_drop_mm = 0.0

[limits]
# Slack-belt danger zone: near the sides the far belt loses tension and can skip.
# Safe box in machine coords (mm from left anchor / down from anchor line). Tune!
safe_x_min = 50.0         # "side 5cm" - within 5cm of a side, the other belt slips
safe_x_max = 268.0        # D - 50
safe_y_min = 55.0         # too high = both belts near-horizontal, weak control
safe_y_max = 385.0        # bottom of travel - counterweight endstop bottoms out

[pen]
# SG90 via grblHAL spindle PWM (GP15), $33=50Hz.
# COLD-BOOT GOTCHA: $33 only re-clocks the PWM on a power-cycle (not soft-reset or a
# live write). Skip the cold boot and you get a ~10deg nudge + overheat as the servo
# chases an out-of-range pulse. See memory: rp2040-grblhal-pwm-coldboot.
# RANGE PROTECTION: $35=5 / $36=10 -> 1.0-2.0ms pulse window (S0=1.0ms, S1000=2.0ms).
# CALIBRATED for the spring push-pull linkage (gondola v2), 2026-06-13:
#   down S50  (~1.05ms) presses a clean line, runs only warm.
#   up   S600 (~1.60ms) lifts ~3-5mm clear; mid-range hold stays cool.
#   S900+ sat near the throw end -> hunting + overheat; max_s caps well below it.
up_s = 600
down_s = 50
min_s = 50                 # software clamp floor (firmware window also guards)
max_s = 750                # cap below the S900 hot/hunting zone
settle_ms = 150            # pause after pen moves - blob-free starts

[paper]
top_offset_mm = 85.0         # measured: pulley line down to the paper's top edge
# origin_x_mm defaults to centered between the anchors: (D - width) / 2
width_mm = 210.0           # A4 portrait
height_mm = 297.0

[draw_area]
# The frame aperture (~30 x 41 cm). Pen must stay inside this.
width_mm = 300.0
height_mm = 410.0
# Paper origin/placement within the draw area is set at calibration (manual home, v1).
